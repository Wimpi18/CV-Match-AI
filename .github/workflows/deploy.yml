name: Deploy Backend to Azure Container Apps

on:
  push:
    branches:
      - main
    paths:
      # El pipeline solo se disparará si hay cambios en el backend o en el propio pipeline
      - "backend/**"
      - ".github/workflows/deploy.yml"

# Permisos requeridos para la autenticación por OIDC
permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: "rg-cvmatchai-prod"
  ACR_NAME: "crcvmatchaicah42hdmorzjm"
  CONTAINER_APP_ENV: "cae-cvmatchai-prod-cah42hdmorzjm"
  CONTAINER_APP_NAME: "ca-cvmatch-api"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: API

    steps:
      # 1. Checkout del código
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. Login en Azure usando OIDC
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # 3. Compilar, Subir a ACR y Desplegar a ACA en un solo paso
      - name: Build and Deploy to Container App
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/backend/CvMatchApi
          acrName: ${{ env.ACR_NAME }}
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppEnvironment: ${{ env.CONTAINER_APP_ENV }}
          containerAppName: ${{ env.CONTAINER_APP_NAME }}
          acrUsername: ${{ secrets.ACR_USERNAME }}
          acrPassword: ${{ secrets.ACR_PASSWORD }}
          targetPort: 8080

      # 4. Actualizar variables de entorno de forma segura usando Azure CLI (maneja espacios en strings)
      - name: Update Container App Environment Variables
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --set-env-vars \
              AZURE_SQL_CONNECTION_STRING="${{ secrets.AZURE_SQL_CONNECTION_STRING }}" \
              COSMOS_CONNECTION_STRING="${{ secrets.COSMOS_CONNECTION_STRING }}" \
              AZURE_STORAGE_CONNECTION_STRING="${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
              AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT="${{ secrets.AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT }}" \
              AZURE_OPENAI_ENDPOINT="${{ secrets.AZURE_OPENAI_ENDPOINT }}" \
              AZURE_OPENAI_KEY="${{ secrets.AZURE_OPENAI_KEY }}" \
              AZURE_OPENAI_DEPLOYMENT_NAME="${{ secrets.AZURE_OPENAI_DEPLOYMENT_NAME }}" \
              JWT_KEY="${{ secrets.JWT_KEY }}" \
              JWT_ISSUER="${{ secrets.JWT_ISSUER }}" \
              JWT_AUDIENCE="${{ secrets.JWT_AUDIENCE }}" \
              GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
              GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
              GOOGLE_CALLBACK_URL="${{ secrets.GOOGLE_CALLBACK_URL }}" \
              APPLICATIONINSIGHTS_CONNECTION_STRING="${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}" \
              FRONTEND_URL="${{ env.FRONTEND_URL }}"

        env:
          AZURE_SQL_CONNECTION_STRING: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
          COSMOS_CONNECTION_STRING: ${{ secrets.COSMOS_CONNECTION_STRING }}
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT: ${{ secrets.AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_KEY: ${{ secrets.AZURE_OPENAI_KEY }}
          AZURE_OPENAI_DEPLOYMENT_NAME: ${{ secrets.AZURE_OPENAI_DEPLOYMENT_NAME }}
          JWT_KEY: ${{ secrets.JWT_KEY }}
          JWT_ISSUER: ${{ secrets.JWT_ISSUER }}
          JWT_AUDIENCE: ${{ secrets.JWT_AUDIENCE }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_CALLBACK_URL: ${{ secrets.GOOGLE_CALLBACK_URL }}
          APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
