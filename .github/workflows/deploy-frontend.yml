name: Deploy Frontend to Azure Static Web Apps

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout del código fuente
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. Compilar y desplegar a Azure Static Web Apps
      - name: Build and Deploy Frontend
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/frontend" # Carpeta raíz del frontend de Angular
          api_location: "" # No usamos funciones backend en SWA (usamos la ACA externa)
          output_location: "dist/frontend/browser" # Ruta de compilación de Angular v17+
